[build-system]
requires = ["uv_build>=0.10.2,<0.11.0"]
build-backend = "uv_build"

[project]
name = "python-common-dev-dependencies"
version = "0.1.0"
description = "An empty package for grouping common dev dependencies"
readme = "README.md"
authors = [
    { name = "Rohan Weeden", email = "reweeden@alaska.edu" }
]
requires-python = ">=3.12"
dependencies = [
    "freezegun~=1.5",
    "moto~=5.1",
    "mypy~=1.19",
    "pytest-cov~=7.0",
    "pytest-mock~=3.15",
    "pytest~=9.0",
    "ruff~=0.14.0",
]
