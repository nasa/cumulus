name: Export requirements.txt from changed uv.lock files

on:
  pull_request:

jobs:
  export-requirements:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Find changed uv.lock files
        run: |
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          BASE_REF="${{ github.event.pull_request.base.ref }}"

          git fetch --no-tags --depth=1 origin "$BASE_SHA"
          git diff --name-only "$BASE_SHA" HEAD -- '**/uv.lock' > changed_lockfiles.txt || true
          cat changed_lockfiles.txt

      - name: Export requirements.txt
        run: |
          while read -r LOCKFILE; do
            [ -z "$LOCKFILE" ] && continue
            DIR=$(dirname "$LOCKFILE")
            echo "Exporting in $DIR"
            (
              cd "$DIR"
              uv export --format requirements-txt --output-file requirements.txt
            )
          done < changed_lockfiles.txt

      - name: Commit updated requirements.txt files
        run: |
          if git diff --quiet -- '**/requirements.txt'; then
            echo "No requirements.txt changes to commit"
            exit 0
          fi

          # This should already be checked out, but depends on configuration of the checkout action
          git checkout ${{ github.event.pull_request.head.ref }}
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add '**/requirements.txt'
          git commit -m "Update requirements.txt from uv.lock changes"
          git push
