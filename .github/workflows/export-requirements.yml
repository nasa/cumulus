name: Export requirements.txt from changed uv.lock files

on:
  pull_request:

jobs:
  export-requirements:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Find changed uv.lock files
        run: |
          BASE="${{ github.event.pull_request.base.sha }}"
          HEAD="${{ github.sha }}"
          git diff --name-only "$BASE" "$HEAD" -- '**/uv.lock' > changed_lockfiles.txt || true
          cat changed_lockfiles.txt

      - name: Export requirements.txt
        run: |
          while read -r LOCKFILE; do
            [ -z "$LOCKFILE" ] && continue
            DIR=$(dirname "$LOCKFILE")
            echo "Exporting in $DIR"
            (
              cd "$DIR"
              uv export --format requirements-txt --output-file requirements.txt
              cat requirements.txt
            )
          done < changed_lockfiles.txt

      #- name: Commit updated requirements.txt files
      #  uses: stefanzweifel/git-auto-commit-action@v5
      #  with:
      #    commit_message: "Update requirements.txt from uv.lock changes"
      #    file_pattern: '**/requirements.txt'
