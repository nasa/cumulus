name: Build and Push Iceberg API Image

on:
  push:
    branches:
      - master
    paths:
      - 'packages/**'
  pull_request:
    branches:
      - master
    paths:
      - 'packages/**'
      - '.github/workflows/build-and-push-iceberg-api-image.yml'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/cumulus-iceberg-api

jobs:
  build-and-push:
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] || [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "tag=$(echo '${{ github.sha }}' | cut -c1-7)" >> $GITHUB_OUTPUT
          elif git diff --name-only HEAD^ HEAD | grep -q '^lerna\.json$'; then
            echo "tag=$(jq --raw-output .version lerna.json)" >> $GITHUB_OUTPUT
          else
            echo "tag=$(echo '${{ github.sha }}' | cut -c1-7)" >> $GITHUB_OUTPUT
          fi

      - name: Build (PR check)
        if: github.event_name == 'pull_request'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./packages/api/app/Dockerfile
          platforms: linux/arm64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.tag }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
