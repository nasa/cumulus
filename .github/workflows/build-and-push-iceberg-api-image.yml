name: Build and Push Iceberg API Image

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  workflow_dispatch:
    inputs:
      push_image:
        description: Push image to GHCR
        required: true
        type: boolean
        default: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/cumulus-iceberg-api
  SOURCE_SHA: ${{ github.event.pull_request.head.sha || github.sha }}

jobs:
  build-and-push:
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
      packages: write
      pull-requests: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine tags
        id: tag
        run: |
          short_sha="${SOURCE_SHA:0:7}"
          source_branch="${GITHUB_HEAD_REF:-}"
          target_branch="${GITHUB_BASE_REF:-${GITHUB_REF_NAME}}"

          if [[ "${GITHUB_EVENT_NAME}" == "push" ]]; then
            target_branch="${GITHUB_REF_NAME}"

            if [[ "$target_branch" == "master" ]]; then
              pr_response="$(curl --silent --show-error \
                --header "Authorization: Bearer ${GITHUB_TOKEN}" \
                --header "Accept: application/vnd.github+json" \
                "${GITHUB_API_URL}/repos/${GITHUB_REPOSITORY}/commits/${GITHUB_SHA}/pulls")"

              source_branch="$(echo "$pr_response" | jq --raw-output '.[0].head.ref // empty')"
              pr_base_branch="$(echo "$pr_response" | jq --raw-output '.[0].base.ref // empty')"

              if [[ -n "$pr_base_branch" ]]; then
                target_branch="$pr_base_branch"
              fi
            fi
          fi

          {
            echo "source_branch=${source_branch}"
            echo "target_branch=${target_branch}"
            echo "tags<<EOF"
            echo "${REGISTRY}/${IMAGE_NAME}:${short_sha}"

            if [[ "$target_branch" == "master" && "$source_branch" =~ ^release-[0-9]+\.[0-9]+\.x$ ]]; then
              release_tag="$(jq --raw-output .version lerna.json)"
              echo "${REGISTRY}/${IMAGE_NAME}:${release_tag}"
            fi

            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Debug tag decision
        run: |
          echo "event=${GITHUB_EVENT_NAME}"
          echo "ref_name=${GITHUB_REF_NAME}"
          echo "manual_push_input=${{ github.event.inputs.push_image || 'n/a' }}"
          echo "resolved_source=${{ steps.tag.outputs.source_branch }}"
          echo "resolved_target=${{ steps.tag.outputs.target_branch }}"
          echo "tags=${{ steps.tag.outputs.tags }}"

      - name: Build image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./packages/api/app/Dockerfile
          platforms: linux/arm64
          push: ${{ (github.event_name == 'push' && github.ref_name == 'master') || (github.event_name == 'workflow_dispatch' && github.event.inputs.push_image == 'true') }}
          tags: ${{ steps.tag.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
